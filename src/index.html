<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏎️ Coin Racer - Nintendo Style Racing Game</title>
    <meta name="description" content="A fun Nintendo-style racing game. Collect all the coins before time runs out!">
</head>


<body>
    <canvas class="webgl"></canvas>

    <!-- Mobile controls overlay -->
    <div id="mobile-controls" aria-hidden="true">
        <!-- Virtual joystick (left) -->
        <div id="joystick" class="joystick" aria-hidden="true">
            <div class="stick"></div>
        </div>
        <div class="design-controls">
            <button class="ctl" data-action="design-prev">‹</button>
            <div id="design-label">Kart</div>
            <button class="ctl" data-action="design-next">›</button>
        </div>
        <div class="dpad">
            <button class="ctl" data-action="up">▲</button>
            <div class="dpad-row">
                <button class="ctl" data-action="left">◀</button>
                <button class="ctl" data-action="down">▼</button>
                <button class="ctl" data-action="right">▶</button>
            </div>
        </div>

        <div class="actions">
            <button class="ctl big" data-action="jump">Jump</button>
            <button class="ctl" data-action="boost">Boost</button>
            <button class="ctl" data-action="color">Color</button>
        </div>
    </div>

</body>

</html>
